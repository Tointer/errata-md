name: Release Packaging Disabled

  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Migration notice
        run: echo "Standalone binary releases are disabled during the Node migration. Electron packaging will replace this workflow."

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/errata-${{ steps.version.outputs.value }}-${{ matrix.name }}.zip
